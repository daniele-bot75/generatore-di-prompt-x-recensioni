<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Generatore Prompt Recensioni Libro</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    padding: 20px;
    max-width: 800px;
    margin: auto;
}
label {
    font-weight: bold;
    display: block;
    margin-top: 15px;
}
input, textarea, button {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    box-sizing: border-box;
    font-size: 14px;
}
textarea {
    resize: vertical;
    min-height: 60px;
}
.buttons {
    margin-top: 20px;
    display: flex;
    gap: 10px;
}
button {
    cursor: pointer;
    font-size: 16px;
}
</style>
</head>

<body>

<h2>Generatore di prompt per recensioni</h2>

<label>Titolo del libro:</label>
<input type="text" id="titolo">

<label>Quante recensioni devo produrre:</label>
<input type="number" id="numero" min="1">

<label>Recensione 1:</label>
<textarea id="r1"></textarea>

<label>Recensione 2:</label>
<textarea id="r2"></textarea>

<label>Recensione 3:</label>
<textarea id="r3"></textarea>

<label>Recensione 4:</label>
<textarea id="r4"></textarea>

<div class="buttons">
<button onclick="genera()">Genera risultato e copia negli appunti</button>
<button onclick="ricomincia()">Ricomincia</button>
</div>

<label>Risultato:</label>
<textarea id="risultato" readonly style="min-height:300px;"></textarea>

<script>
function genera() {

    const titolo = document.getElementById("titolo").value || "";
    const numero = parseInt(document.getElementById("numero").value) || 1;

    const recensioni = [
        document.getElementById("r1").value,
        document.getElementById("r2").value,
        document.getElementById("r3").value,
        document.getElementById("r4").value
    ].filter(r => r.trim() !== "");

    const n = recensioni.length;

    let elenco = "";
    recensioni.forEach((rec, index) => {
        elenco += ` ${index + 1}) ${rec}`;
    });

    let testo = "";

    if (numero < 2) {

        testo =
`Devo scrivere ${numero} recensione di 3 righe su questo libro: "${titolo}".
La recensione che scrivo dovrà contenere riferimenti che fanno riferimento al mio gusto personale, come ad esempio "Mi è piaciuto perchè" oppure "Ho apprezzato la parte in cui"
La recensione che scrivo dovrà terminare con un consiglio di una parola, come ad esempio "Bello." oppure "Consigliato." oppure "Raccomandato.", scritta come ultimo rigo e senza grassetto
Puoi aiutarmi, sulla base di ${n} recensioni fatte dai miei colleghi, prendendo spunto e senza allontanarti troppo?
Eccole:${elenco}
Procedi, e mi raccomando: genera anche un titolo di max 5 parole, e non inserire righe vuote tra il titolo e la recensione e tra la recensione e la parola consiglio finale:`;

    } else {

        testo =
`Devo scrivere ${numero} recensioni di 3 righe su questo libro: "${titolo}".
Ogni recensione che scrivo dovrà contenere riferimenti che fanno riferimento al mio gusto personale, come ad esempio "Mi è piaciuto perchè" oppure "Ho apprezzato la parte in cui"
Ogni recensione che scrivo dovrà terminare con un consiglio di una parola, come ad esempio "Bello." oppure "Consigliato." oppure "Raccomandato.", scritta come ultimo rigo e senza grassetto
Puoi aiutarmi, sulla base di ${n} recensioni fatte dai miei colleghi, prendendo spunto e senza allontanarti troppo?
Eccole:${elenco}
Procedi, e mi raccomando: strutturalmente le recensioni non devono risultare simili, devono avere poche parole in comune, non devi usare le stesse parole quando aggiungi le impressioni personali in cui dici perchè ti è piaciuto, e per ognuna genera anche un titolo di max 5 parole, e non inserire righe vuote tra il titolo e la recensione e tra la recensione e la parola consiglio finale:`;

    }

    const risultato = document.getElementById("risultato");
    risultato.value = testo;

    risultato.select();
    risultato.setSelectionRange(0, 99999);
    navigator.clipboard.writeText(testo);
}

function ricomincia() {
    document.getElementById("titolo").value = "";
    document.getElementById("numero").value = "";
    document.getElementById("r1").value = "";
    document.getElementById("r2").value = "";
    document.getElementById("r3").value = "";
    document.getElementById("r4").value = "";
    document.getElementById("risultato").value = "";
}
</script>

</body>
</html>
